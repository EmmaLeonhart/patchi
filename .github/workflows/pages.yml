# Publishes the docs/ folder as a GitHub Pages site (the themed research
# report) and builds a transportable PDF from FINDINGS.md into docs/report.pdf.
#
# Pages is auto-enabled by the `actions/configure-pages` step below
# (enablement: true), so there is NO manual "Settings -> Pages" toggle to do —
# the only requirement is that the repo is PUBLIC (free GitHub Pages). The first
# push that runs this workflow turns Pages on and deploys.

name: pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages (auto-enables Pages if not already on)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Install pandoc + PDF engine
        run: sudo apt-get update && sudo apt-get install -y pandoc wkhtmltopdf
      - name: Build report PDF into docs/
        run: |
          mkdir -p docs
          SRC=PAPER.md
          [ -f "$SRC" ] || SRC=FINDINGS.md
          # Build the typeset paper. No error-swallow: if this fails the build
          # fails loudly (a silently-missing report.pdf is the bug this prevents).
          pandoc "$SRC" -o docs/report.pdf --pdf-engine=wkhtmltopdf \
            -V margin-top=18 -V margin-bottom=18 -V margin-left=18 -V margin-right=18
          test -s docs/report.pdf
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
